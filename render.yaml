services:
  # Backend API
  - type: web
    name: bici-reorder-point-dashboard-b
    runtime: docker
    rootDir: backend
    plan: free # Ensure it stays on free tier if needed

  # Frontend Dashboard
  - type: web
    name: bici-reorder-point-dashboard-f
    runtime: node
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 18.17.0
